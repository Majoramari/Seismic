@if (slices().length > 0) {
  <div class="pie-chart-container">
    <div class="pie-chart-wrapper">
      <svg viewBox="0 0 120 120" class="pie-chart-svg">
        @for (slice of slices(); track slice.id) {
          <path
            [attr.d]="slice.pathD"
            [style.fill]="slice.color"
            (mouseenter)="onSliceHover(slice)"
            (mouseleave)="onSliceLeave()"
            class="pie-slice"
          />
        }
      </svg>

      @if (hoveredSlice(); as hovered) {
        <div class="pie-tooltip">
          <span class="pie-tooltip-dot" [style.background]="hovered.color"></span>
          {{ hovered.label }} {{ formatDuration(hovered.seconds) }}
        </div>
      }
    </div>

    <div class="pie-chart-legend">
      @for (slice of legendSlices(); track slice.id) {
        <div class="pie-legend-item">
          <span class="pie-legend-dot" [style.background]="slice.color"></span>
          {{ slice.label }}
        </div>
      }
    </div>
  </div>
} @else {
  <p class="text-muted pie-chart-empty">{{ emptyLabel() }}</p>
}
