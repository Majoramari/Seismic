<div class="goal-card" [class.goal-card-complete]="isComplete()">
  <div class="goal-card-main">
    <p class="goal-progress-text">
      <span class="goal-progress-current" [class.goal-progress-complete]="isComplete()">
        {{ progressText().split('/')[0] }}
      </span>
      <span class="text-muted">/{{ progressText().split('/')[1] }}</span>
    </p>
    <p class="goal-scope-label text-muted">{{ label() }}</p>
  </div>

  <div class="goal-card-side">
    <div class="goal-card-meta">
      <p class="goal-period-label" [class.goal-period-complete]="isComplete()">
        {{ periodLabel() }}
      </p>
      <p class="goal-remaining-text" [class.goal-remaining-done]="isComplete()">
        {{ remainingText() }}
      </p>
    </div>

    <svg class="goal-ring" viewBox="0 0 40 40">
      @if (isComplete()) {
        <circle class="goal-ring-track" cx="20" cy="20" r="18" />
        <circle
          class="goal-ring-progress goal-ring-complete"
          cx="20"
          cy="20"
          r="18"
          style="stroke-dashoffset: 0"
        />
        <path class="goal-check-icon" d="M13 20l4 4 10-10" />
      } @else {
        <circle class="goal-ring-track" cx="20" cy="20" r="18" />
        <circle
          class="goal-ring-progress"
          cx="20"
          cy="20"
          r="18"
          [style.stroke-dashoffset]="circleOffset()"
        />
        <text x="20" y="24" class="goal-ring-text" text-anchor="middle">
          {{ goal().percentage }}%
        </text>
      }
    </svg>
  </div>

  <div class="goal-bar-track">
    <div
      class="goal-bar-fill"
      [class.goal-bar-complete]="isComplete()"
      [style.width.%]="barPercentage()"
    ></div>
  </div>
</div>
