<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background-color:#f4f4f5; font-family:Arial, Helvetica, sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0"
       style="background-color:#f4f4f5; padding:60px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="480" cellpadding="0" cellspacing="0"
                   style="max-width:480px; width:100%; background-color:#ffffff; border-radius:16px; border:1px solid #e5e5e8;">
                <tr>
                    <td align="center" style="padding:48px 40px 0 40px;">
                        <span style="color:#d97757; font-size:26px; font-weight:bold;">Seismic</span>
                    </td>
                </tr>
                <tr>
                    <td align="center" style="padding:32px 40px 0 40px;">
                        <h1 style="color:#111114; font-size:22px; margin:0 0 12px 0;">You're falling behind on your
                            goal</h1>
                        <p style="color:#71717a; font-size:15px; line-height:1.6; margin:0;">
                            {{GOAL_LABEL}}: you've coded {{PROGRESS}} of your {{TARGET}} {{PERIOD}} goal.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td align="center" style="padding:32px 40px 48px 40px;">
                        <table role="presentation" cellpadding="0" cellspacing="0">
                            <tr>
                                <td align="center" style="background-color:#111114; border-radius:10px;">
                                    <a href="{{APP_URL}}/dashboard"
                                       style="display:inline-block; padding:16px 40px; color:#ffffff; font-size:15px; font-weight:600; text-decoration:none;">
                                        Open Dashboard
                                    </a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
            <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width:480px; width:100%;">
                <tr>
                    <td align="center" style="padding:24px 40px;">
                        <p style="color:#a1a1aa; font-size:12px; margin:0;">Your code speaks. We listen.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
