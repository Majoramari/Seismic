info:
  name: Health
  type: http
  seq: 1
  tags:
    - smoke

http:
  method: GET
  url: "{{baseUrl}}/health"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.status
      operator: eq
      value: ok

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Returns `{ "status": "ok" }` when the API process is reachable.
