info:
  name: Verify Magic Link
  type: http
  seq: 2
  tags:
    - auth

http:
  method: GET
  url: "{{baseUrl}}/api/auth/verify?token={{magicLinkToken}}"
  params:
    - name: token
      value: "{{magicLinkToken}}"
      type: query

runtime:
  variables:
    - name: magicLinkToken
      value: 3b53feb1-9f04-46ab-b2ca-0e9d510462f4
  scripts:
    - type: after-response
      code: |-
        if (res.body && res.body.data) {
          if (res.body.data.signupToken) {
            bru.setVar("signupToken", res.body.data.signupToken);
          }

          if (res.body.data.accessToken) {
            bru.setVar("accessToken", res.body.data.accessToken);
          }
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.success
      operator: eq
      value: "true"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Verifies a magic-link token.

  Existing users receive `data.accessToken`; new users receive `data.signupToken`.
