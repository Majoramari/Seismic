info:
  name: Refresh Access Token
  type: http
  seq: 4
  tags:
    - auth

http:
  method: POST
  url: "{{baseUrl}}/api/auth/refresh"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.body && res.body.data && res.body.data.accessToken) {
          bru.setVar("accessToken", res.body.data.accessToken);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.success
      operator: eq
      value: "true"
    - expression: res.body.data.accessToken
      operator: isString

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Reads the `refresh_token` HTTP-only cookie, rotates it, and returns a new access token.

  Run after login/signup in the same Bruno cookie jar.
